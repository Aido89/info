        async function fetchWithBackoff(url, options, retries = 3, delay = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response;
            } catch (error) {
                if (retries > 0 && error.message.includes('429')) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchWithBackoff(url, options, retries - 1, delay * 2);
                }
                throw error;
            }
        }
        
        async function generateAssignmentHelp(moduleId) {
            const moduleData = bilingualModulesData.find(m => m.id === moduleId);
            if (!moduleData) return;

            const assignmentText = moduleData.content[currentLang].задание;
            const t = uiText[currentLang];
            
            const loadingElement = document.getElementById(`assignment-loading-${moduleId}`);
            const resultElement = document.getElementById(`assignment-result-${moduleId}`);
            const button = document.getElementById(`gemini-button-${moduleId}`);

            loadingElement.classList.remove('hidden');
            resultElement.innerHTML = '';
            button.disabled = true;

            const userPrompt = t.aiUserPromptPrefix + `"${assignmentText}"`;
            const systemPrompt = t.aiSystemPrompt;

            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
            };

            try {
                const response = await fetchWithBackoff(getApiUrl() + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const generatedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Не удалось получить ответ от Gemini. / Gemini-ден жауап алу мүмкін болмады.";
                
                resultElement.innerHTML = `<h4 class="font-semibold mt-4 mb-2 text-gray-700">${t.aiResult}</h4><div class="p-3 bg-red-100 rounded-lg border border-red-300 text-sm shadow-inner">${generatedText.replace(/\n/g, '<br>')}</div>`;

            } catch (error) {
                console.error("Gemini API Error:", error);
                const msg = (error.message.includes('401') || error.message.includes('403'))
                  ? 'Доступ к API отклонен (401/403). Проверьте ключ и модель в настройках AI ⚙️.'
                  : `Ошибка при получении данных: ${error.message}`;
                // Local fallback: simple rubric generator
                const fallback = `Черновик рубрики (3×3):\n\nКритерии: К1 Ясность; К2 Полнота; К3 Оформление.\nУровни: Низкий (0-1) — частично/ошибки; Средний (2) — в целом выполнено; Высокий (3) — требования полностью соблюдены.`;
                resultElement.innerHTML = `<div class="mt-3 space-y-2"><p class="text-red-500">${msg}</p><pre class="p-3 bg-gray-50 border rounded text-sm whitespace-pre-wrap">${fallback}</pre></div>`;
            } finally {
                loadingElement.classList.add('hidden');
                button.disabled = false;
            }

        /**
         * Helper function to determine a concise title for navigation buttons.
         * @param {string} moduleTitle - Full title like '1. Введение в Google Workspace'.
         * @returns {string} Short title like 'Введение'.
         */
        function getShortNavTitle(moduleTitle) {
            // Extract numeric prefix like "4. " if present
            const numMatch = moduleTitle.match(/^\s*(\d+)\.\s*/);
            const numPrefix = numMatch ? `${numMatch[1]}. ` : '';

            // Remove leading number and the word "Google " for clearer, unique labels
            let namePart = moduleTitle.replace(/^\s*\d+\.\s*/, '').replace(/^Google\s+/i, '');

            // If there is a dash/long dash, take the left part as the core label
            const core = namePart.split(/[–-]/)[0].trim();

            // Use up to two words to avoid duplicates like "Google"
            const words = core.split(/\s+/);
            const short = words.slice(0, Math.min(2, words.length)).join(' ');

            return `${numPrefix}${short}`.trim();
        }

            items.forEach((item, index) => {
                const stepNumber = index + 1;
                const contentWithEmphasis = item.innerHTML.replace(/(\*\*\d+\. .*?:)/, '<span class="text-gray-900 font-bold">$1</span>');
                formattedList += `<li data-list-counter="${stepNumber}.">` + contentWithEmphasis.replace(/\*\*/g, '') + `</li>`;
            });

            formattedList += `</ul>`;
            return formattedList;
        }
        
        function formatInteractiveContent(htmlString) {
            let formattedString = htmlString.replace(/<br>/g, '</p><p>');
            return `<div class="interactive-section text-gray-700">${formattedString}</div>`;
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-navigation');
            if (!container) return;
            container.innerHTML = '';
            bilingualModulesData.forEach(module => {
                const moduleTitle = module.title[currentLang] || module.title.ru;
                const overrideTitle = getOverrideShortTitle(module, currentLang);
                const navTitle = overrideTitle || getShortNavTitle(moduleTitle);
                const li = document.createElement('li');
                li.innerHTML = `
                    <button data-id="${module.id}" title="${moduleTitle}" class="nav-item transition-colors" onclick="setActiveModule(${module.id})">
                        <span class="w-6 h-6 flex items-center justify-center">${module.icon}</span>
                        <span class="text-label font-medium">${navTitle}</span>
                    </button>
                `;
                container.appendChild(li);
            });
            const activeBtn = container.querySelector(`button[data-id="${currentModuleId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function updateCompletionDisplay() {
            const total = bilingualModulesData.length;
            const completed = visitedModules.size;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            const t = uiText[currentLang];
            
            const element = document.getElementById('completion-display');
            if (element) {
                element.textContent = `${t.modulesLabel}: ${completed} из ${total} (${percentage}%)`;
                
                element.className = 'score-badge mt-4 mx-auto text-lg';
                if (percentage >= 75) {
                    element.classList.add('score-high');
                } else if (completed > 0) {
                    element.classList.add('score-medium');
                } else {
                    element.classList.add('score-low');
                }
            }
        }

        function updateTestScoreDisplay() {
            const totalTests = bilingualModulesData.length;
            const correctCount = correctlyCompletedTests.size;
            const percentage = totalTests > 0 ? Math.round((correctCount / totalTests) * 100) : 0;
            const t = uiText[currentLang];
            
            const scoreElement = document.getElementById('score-display');
            if (scoreElement) {
                scoreElement.textContent = `${t.testsLabel}: ${correctCount} из ${totalTests} (${percentage}%)`;
                
                scoreElement.className = 'score-badge mt-4 mx-auto text-lg';
                if (percentage >= 75) {
                    scoreElement.classList.add('score-high');
                } else if (correctCount > 0) {
                    scoreElement.classList.add('score-medium');
                } else {
                    scoreElement.classList.add('score-low');
                }
            }
        }

        function checkTest(moduleId) {
            const moduleData = bilingualModulesData.find(m => m.id === moduleId);
            if (!moduleData) return;

            const t = uiText[currentLang];
            const moduleContent = moduleData.content[currentLang] || moduleData.content.ru;

            const form = document.getElementById(`test-${moduleId}`);
            const feedbackElement = document.getElementById(`test-feedback-${moduleId}`);
            const selectedOption = form.querySelector('input[name="answer"]:checked');
            
            if (!selectedOption) {
                showFeedback(t.feedbackAttention, t.feedbackMessageEmpty, 'blue');
                return;
            }

            const selectedIndex = parseInt(selectedOption.value);
            const isCorrect = selectedIndex === moduleContent.миниТест.correct;
            
            if (isCorrect) {
                if (!correctlyCompletedTests.has(moduleId)) {
                    correctlyCompletedTests.add(moduleId);
                    updateTestScoreDisplay();
                }
                
                showFeedback(t.feedbackCorrect, t.feedbackMessageCorrect, 'green');
                feedbackElement.textContent = t.feedbackTestCorrect;
                feedbackElement.classList.remove('text-red-600');
                feedbackElement.classList.add('text-green-600');
            } else {
                showFeedback(t.feedbackWrong, t.feedbackMessageWrong, 'red');
                feedbackElement.textContent = t.feedbackTestWrong;
                feedbackElement.classList.remove('text-green-600');
                feedbackElement.classList.add('text-red-600');
            }
        }

        function showFeedback(title, message, color = 'blue') {
            const modal = document.getElementById('feedback-modal');
            document.getElementById('feedback-title').textContent = title;
            document.getElementById('feedback-message').textContent = message;
            
            const colorClass = color === 'green' ? 'text-green-600' : color === 'red' ? 'text-red-600' : 'text-blue-600';
            document.getElementById('feedback-title').className = `text-2xl font-bold mb-3 ${colorClass}`;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function setupFeedbackModal() {
            const modal = document.getElementById('feedback-modal');
            const closeButton = document.getElementById('close-feedback');
            closeButton.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            });
        }
        
        function createProgressChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Изучено', 'Осталось'], // Keep fixed labels for Chart.js internals
                    datasets: [{
                        data: [0, bilingualModulesData.length],
                        backgroundColor: ['#1a73e8', '#e0e0e0'],
                        borderColor: '#f7f9fc',
                        borderWidth: 6,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const t = uiText[currentLang];
                                    let label = context.dataIndex === 0 ? t.modulesLabel : (context.dataIndex === 1 ? 'Қалған' : 'Remaining');
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed !== null) {
                                        label += context.parsed;
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateProgressChart() {
            const completed = visitedModules.size;
            const total = bilingualModulesData.length;
            const remaining = total - completed;
            progressChart.data.datasets[0].data = [completed, remaining];
            progressChart.update();
        }

        function updateBonusModalContent() {
            const t = uiText[currentLang];
            const bonus = bonusData[currentLang] || bonusData.ru;
            const bonusContent = document.getElementById('bonus-content');
            
            document.getElementById('bonus-modal-title').textContent = t.bonusModalTitle;

            bonusContent.innerHTML = bonus.ideas.map(idea => `<div class="p-3 bg-gray-50 rounded-lg border border-gray-100">${idea}</div>`).join('');
        }

        function setupBonusModal() {
            const bonusToggle = document.getElementById('bonus-toggle');
            const bonusModal = document.getElementById('bonus-modal');
            const closeModal = document.getElementById('close-modal');

            bonusToggle.addEventListener('click', () => {
                updateBonusModalContent();
                bonusModal.classList.remove('hidden');
                bonusModal.classList.add('flex');
            });

            closeModal.addEventListener('click', () => {
                bonusModal.classList.add('hidden');
                bonusModal.classList.remove('flex');
            });
            
            bonusModal.addEventListener('click', (e) => {
                if (e.target === bonusModal) {
                    bonusModal.classList.add('hidden');
                    bonusModal.classList.remove('flex');
                }
            });
        }

        function setupAiSettings() {
            const openBtn = document.getElementById('open-ai-settings');
            const modal = document.getElementById('ai-settings-modal');
            const closeBtn = document.getElementById('close-ai-settings');
            const keyInput = document.getElementById('ai-api-key');
            const modelSelect = document.getElementById('ai-model');
            if (!openBtn || !modal || !closeBtn || !keyInput || !modelSelect) return;
            // init values
            keyInput.value = apiKey;
            modelSelect.value = apiModel;
            openBtn.addEventListener('click', () => {
                keyInput.value = apiKey;
                modelSelect.value = apiModel;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
            closeBtn.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            });
            document.getElementById('save-ai-settings').addEventListener('click', () => {
                apiKey = keyInput.value.trim();
                apiModel = modelSelect.value;
                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('gemini_api_model', apiModel);
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                showFeedback('OK', 'Настройки ИИ сохранены.', 'green');
            });
        }

        function renderCourseMaterials() {

                title.textContent = 'Материалы курса';
                intro.textContent = 'Ниже — видео курса. При необходимости открою список модулей.';

        // --- SUMMARY MODAL ---
        function setupSummaryModal() {
            const openBtn = document.getElementById('summary-toggle');
            const modal = document.getElementById('summary-modal');
            const closeBtn = document.getElementById('close-summary');
            if (!openBtn || !modal || !closeBtn) return;
            openBtn.addEventListener('click', () => {
                updateSummaryContent();
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
            closeBtn.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            });
            updateSummaryTexts();
        }

        function updateSummaryTexts() {
            const t = uiText[currentLang];
            const btn = document.getElementById('summary-toggle');
            const title = document.getElementById('summary-modal-title');
            if (btn) btn.textContent = currentLang === 'kk' ? 'Конспект модулдер' : 'Конспект модулей';
            if (title) title.textContent = currentLang === 'kk' ? 'Барлық модульдер конспектісі' : 'Конспект всех модулей';
        }

        function updateSummaryContent() {
            const container = document.getElementById('summary-content');
            if (!container) return;
            const t = uiText[currentLang];
            container.innerHTML = bilingualModulesData.map(m => {
                const title = m.title[currentLang] || m.title.ru;
                const c = m.content[currentLang] || m.content.ru;
                return `
                    <div class="p-4 rounded-lg border border-gray-200 bg-white">
                        <div class="flex items-center gap-2 mb-2"><span class="w-6 h-6">${m.icon}</span><h3 class="font-semibold text-lg">${title}</h3></div>
                        <p class="mb-2"><strong>${t.sectionGoal}</strong> ${c.goal || ''}</p>
                        <p class="mb-2"><strong>${t.sectionAssignment}</strong> ${c.задание || ''}</p>
                        <button class="mt-2 text-blue-600 font-semibold underline" onclick="setActiveModule(${m.id}); document.getElementById('summary-modal').classList.add('hidden'); document.getElementById('summary-modal').classList.remove('flex');">Перейти к модулю</button>
                    </div>
                `;
            }).join('');
        }
