<svg width="160" height="160" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Левая нога (IT/сеть) -->
  <path d="M 35 85 L 45 40" stroke="url(#techGradient)" stroke-width="10" stroke-linecap="round"/>

  <!-- Правая нога (Медиа/поток) -->
  <path d="M 65 85 L 55 40" stroke="url(#techGradient)" stroke-width="10" stroke-linecap="round"/>

  <!-- Вершина (образование/STEAM) -->
  <path d="M 45 40 L 50 25 L 55 40" fill="url(#techGradient)"/>

  <!-- Перекладина (стабильность/интеграция) -->
  <line x1="40" y1="65" x2="60" y2="65" stroke="url(#techGradient)" stroke-width="8" stroke-linecap="round"/>

  <!-- Play (медиа) -->
  <path d="M 68 62 L 78 68 L 68 74 Z" fill="#FFFFFF" opacity="0.9"/>

  <!-- Узел (мониторинг/сеть) -->
  <circle cx="32" cy="65" r="4" fill="#FFFFFF" opacity="0.9"/>
</svg>

